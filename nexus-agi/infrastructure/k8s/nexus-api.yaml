apiVersion: apps/v1
kind: Deployment
metadata: { name: nexus-api }
spec:
  replicas: 1
  selector: { matchLabels: { app: nexus-api } }
  template:
    metadata: { labels: { app: nexus-api } }
    spec:
      containers:
      - name: api
        image: nexus-api:latest
        ports: [{containerPort: 8000}]
---
apiVersion: v1
kind: Service
metadata: { name: nexus-api }
spec:
  selector: { app: nexus-api }
  ports: [{port: 8000, targetPort: 8000}]
