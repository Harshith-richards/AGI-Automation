version: '3.9'
services:
  nexus-api:
    build: ../backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports: ['8000:8000']
    depends_on: [postgres, redis]
    healthcheck: { test: ['CMD', 'curl', '-f', 'http://localhost:8000/health'], interval: 30s, timeout: 5s, retries: 3 }
  nexus-ui:
    build: ../frontend
    ports: ['3000:80']
  nexus-worker:
    build: ../backend
    command: celery -A backend.worker.celery_app.celery_app worker --loglevel=info
    depends_on: [redis]
  nexus-beat:
    build: ../backend
    command: celery -A backend.worker.celery_app.celery_app beat --loglevel=info
    depends_on: [redis]
  postgres:
    image: postgres:16
    environment: { POSTGRES_PASSWORD: postgres, POSTGRES_USER: postgres, POSTGRES_DB: nexus }
    volumes: ['pg_data:/var/lib/postgresql/data']
  redis:
    image: redis:7
  qdrant:
    image: qdrant/qdrant:v1.10.1
  neo4j:
    image: neo4j:5
    environment: { NEO4J_AUTH: neo4j/password }
  playwright:
    image: mcr.microsoft.com/playwright:v1.46.0-jammy
  prometheus:
    image: prom/prometheus
  grafana:
    image: grafana/grafana
  flower:
    image: mher/flower
volumes:
  pg_data: {}
